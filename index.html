<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelda: Eco-Explorer of Hyrule</title>
    <style>
        /* 1. 젤다의 전설 테마 인터페이스 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030708;
            font-family: 'Malgun Gothic', sans-serif;
            color: #cfebef;
        }

        /* 2. 레이아웃 시스템 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 젤다 스타일 고풍스럽고 정교한 사이드바 */
        .sidebar {
            width: 380px;
            height: 100%;
            background: linear-gradient(180deg, #061014 0%, #020608 100%);
            border-right: 4px double #00e5ff;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.8);
        }

        .main-content {
            flex: 1;
            height: 100%;
            position: relative;
        }

        .map-area, .roadview-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 0.4s ease;
        }
        .map-area { z-index: 2; opacity: 1; }
        .roadview-area { z-index: 1; opacity: 0; }

        .battle-active .map-area { z-index: 1; opacity: 0; }
        .battle-active .roadview-area { z-index: 2; opacity: 1; }

        /* 3. 젤다 고유 HUD 시스템 */
        .game-header {
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .title-sub {
            font-size: 11px;
            color: #00e5ff;
            letter-spacing: 3px;
        }
        .title-main {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px rgba(0,229,255,0.8);
            margin-top: 5px;
        }

        /* 🔷 루피 인벤토리 UI */
        .rupee-hud {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #39ff14;
            text-shadow: 0 0 10px rgba(57,255,20,0.6);
            background: rgba(0, 229, 255, 0.05);
            border: 1px dashed rgba(0,229,255,0.3);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .rupee-icon { margin-right: 10px; }

        /* 🗺️ 탐색 검색창 */
        .search-box {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00e5ff;
            border-radius: 4px;
            color: #fff;
        }
        .search-box button {
            padding: 0 18px;
            background: #00e5ff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .search-box button:hover { background: #fff; box-shadow: 0 0 10px #fff; }

        /* 지역 리스트 */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }
        .result-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0, 229, 255, 0.1);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-item:hover {
            background: rgba(0, 229, 255, 0.08);
            border-color: #00e5ff;
            transform: translateX(4px);
        }

        /* ⚔️ 보스 체력바 및 전투 패널 */
        .battle-hud {
            display: none;
            background: rgba(255, 0, 60, 0.03);
            border: 1px solid #ff003c;
            padding: 15px;
            border-radius: 6px;
            margin-top: auto;
            box-shadow: 0 0 15px rgba(255,0,60,0.1);
        }
        .danger-title {
            color: #ff003c;
            font-weight: bold;
            text-align: center;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 12px;
            animation: pulse 1s infinite alternate;
        }
        .monster-name-tag { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 8px; text-align: center;}
        
        /* 젤다 스타일 하트/에너지 보스 피통 */
        .hp-outer { width: 100%; height: 14px; background: #1a0005; border: 1px solid #ff003c; border-radius: 7px; overflow: hidden; }
        .hp-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #ff003c 0%, #ff6b8b 100%); transition: width 0.15s ease; }
        
        .btn-escape {
            width: 100%; margin-top: 15px; padding: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.4);
            color: #ccc; cursor: pointer; border-radius: 4px;
        }
        .btn-escape:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* 4. 로드뷰 내 크리티컬 히트 존 (몬스터 오버레이) */
        .monster-overlay {
            position: absolute;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .monster-img {
            width: 250px;
            height: auto;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.8));
            animation: floatGlow 2.5s ease-in-out infinite;
            transition: transform 0.05s;
        }
        .monster-img:active { transform: scale(0.9); }

        /* 💥 데미지 팝업 이펙트 */
        .damage-pop {
            position: absolute;
            font-size: 42px;
            font-weight: 900;
            color: #ffeb3b;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            animation: popUp 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 9999;
        }

        /* 5. 지리 정보 고대 카드 모달 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center;
        }
        .ancient-card {
            background: #061014; border: 2px solid #00e5ff; border-radius: 8px;
            width: 400px; padding: 25px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            transform: scale(0.8); opacity: 0; transition: all 0.3s ease;
        }
        .modal.active .ancient-card { transform: scale(1); opacity: 1; }
        .card-title { font-size: 22px; color: #00e5ff; margin-bottom: 15px; font-weight: bold; }
        .card-info { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,229,255,0.2); padding: 15px; border-radius: 4px; text-align: left; line-height: 1.6; margin-bottom: 20px;}
        .btn-claim { width: 100%; padding: 12px; background: #39ff14; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 15px;}

        /* 키프레임 애니메이션 */
        @keyframes floatGlow {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.03); }
            100% { transform: translateY(0) scale(1); }
        }
        @keyframes popUp {
            0% { opacity: 1; transform: translateY(0) scale(0.6); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.2); }
        }
        @keyframes pulse {
            0% { opacity: 0.4; text-shadow: 0 0 2px red; }
            100% { opacity: 1; text-shadow: 0 0 10px red; }
        }

        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .sidebar { width: 100%; height: 45%; border-right: none; border-top: 4px double #00e5ff; }
            .main-content { flex: 1; height: 55%; }
        }
    </style>
</head>
<body>

    <div id="gameContainer" class="container">
        <div class="sidebar">
            <div class="game-header">
                <div class="title-sub">THE LEGEND OF GEOGRAPHY</div>
                <div class="title-main">하이랄 지리 조사단</div>
            </div>

            <div class="rupee-hud">
                <span class="rupee-icon">🔷</span>
                <span id="totalRupees">0</span>
            </div>

            <div class="search-box">
                <input type="text" id="targetKeyword" placeholder="조사할 지명 입력 (예: 해운대)">
                <button onclick="searchNewRegion()">조사</button>
            </div>

            <ul id="regionList" class="result-list">
                <li style="color:#666; text-align:center; padding-top:30px;">지역을 검색하여 몬스터를 스캔하세요.</li>
            </ul>

            <div id="battleHud" class="battle-hud">
                <div class="danger-ui danger-title">⚔️ ENEMY ENCOUNTERED ⚔️</div>
                <div id="activeMonsterName" class="monster-name-tag">-</div>
                <div class="hp-outer">
                    <div id="monsterHp" class="hp-inner"></div>
                </div>
                <button class="btn-escape" onclick="escapeBattle()">전투 도망치기</button>
            </div>
        </div>

        <div class="main-content">
            <div id="map" class="map-area"></div>
            <div id="roadview" class="roadview-area"></div>
        </div>
    </div>

    <div id="rewardModal" class="modal">
        <div class="ancient-card">
            <div id="modalRegionName" class="card-title">📍 서울 종로구</div>
            <div id="modalRegionText" class="card-info">지리 정보 로딩 실패</div>
            <button class="btn-claim" onclick="claimRewards()">루피 및 도감 획득</button>
        </div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5fadde5e88e43357b899abb7558e6206&libraries=services&autoload=false"></script>
    <script>
        let map, rv, rvClient, ps;
        let currentBattle = null;
        let totalRupees = 0;
        let currentMarkers = [];

        // 시스템 기동 및 보호 로드
        kakao.maps.load(function() {
            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 4
            });

            ps = new kakao.maps.services.Places();
            rv = new kakao.maps.Roadview(document.getElementById('roadview'));
            rvClient = new kakao.maps.RoadviewClient();

            // 최초 GPS 수신 동기화
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
                });
            }
        });

        // 1. [핵심 변경] 모든 검색 지역에 100% 몬스터 실시간 매핑 알고리즘
        function searchNewRegion() {
            const kw = document.getElementById('targetKeyword').value;
            if (!kw.trim()) return;

            ps.keywordSearch(kw, function(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    generateRegionMonsters(data);
                } else {
                    alert('해당 지형은 스캔할 수 없습니다.');
                }
            });
        }

        function generateRegionMonsters(places) {
            const list = document.getElementById('regionList');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 기존 마커 전체 클리어
            currentMarkers.forEach(m => m.setMap(null));
            currentMarkers = [];
            list.innerHTML = '';

            places.slice(0, 6).forEach((place, idx) => {
                const pos = new kakao.maps.LatLng(place.y, place.x);
                bounds.extend(pos);

                // 보코블린 / 가디언 무작위 매칭 엔진
                const isBoss = idx % 3 === 0; 
                const monster = {
                    name: isBoss ? "고대 가디언" : "야생 보코블린",
                    type: isBoss ? "guardian" : "bokoblin",
                    maxHp: isBoss ? 240 : 100,
                    hp: isBoss ? 240 : 100,
                    reward: isBoss ? 150 : 60,
                    placeName: place.place_name,
                    address: place.road_address_name || place.address_name,
                    lat: place.y,
                    lng: place.x
                };

                // 지도에 젤다 고유 아이콘 핀 배치
                const markerEl = document.createElement('div');
                markerEl.style.cssText = 'font-size:32px; cursor:pointer; filter:drop-shadow(0 0 6px red);';
                markerEl.innerHTML = isBoss ? '👁️' : '👹';

                const overlay = new kakao.maps.CustomOverlay({
                    position: pos,
                    content: markerEl,
                    map: map
                });
                currentMarkers.push(overlay);

                // 사이드바 목록 노드 생성
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `<strong>${monster.name} 출현</strong><br><span style="font-size:11px;color:#00e5ff;">📍 ${place.place_name}</span>`;
                
                // 마커 및 리스트 클릭 연동 -> 로드뷰 격투 돌입
                const startAction = () => initBattleMode(monster);
                markerEl.onclick = startAction;
                li.onclick = startAction;

                list.appendChild(li);
            });

            map.setBounds(bounds);
        }

        // 2. [완벽 해결] 로드뷰 내부 방향 정렬(POV) 매커니즘 장착 보스전 진입
        function initBattleMode(monster) {
            currentBattle = monster;
            const targetPos = new kakao.maps.LatLng(monster.lat, monster.lng);

            rvClient.getNearestPanoId(targetPos, 60, function(panoId) {
                if (!panoId) {
                    alert('이 좌표 인근에는 몬스터가 숨을 수 있는 거리뷰 데이터가 없습니다. 다른 좌표를 타격하십시오.');
                    return;
                }

                // 로드뷰 로드
                rv.setPanoId(panoId, targetPos);
                document.getElementById('gameContainer').classList.add('battle-active');
                document.getElementById('regionList').style.display = 'none';
                document.getElementById('battleHud').style.display = 'block';
                
                document.getElementById('activeMonsterName').innerText = monster.name;
                document.getElementById('monsterHp').style.width = '100%';

                // [핵심 디버깅 해결책] 로드뷰 카메라 시점(POV)을 몬스터 좌표 방향으로 강제 회전 보장
                setTimeout(() => {
                    const projection = rv.getProjection();
                    // 몬스터 좌표 기반으로 카메라가 바라볼 최적의 상하좌우 각도(POV)를 계산해냄
                    const viewpoint = projection.viewpointFromCoords(targetPos);
                    
                    // 로드뷰 카메라 각도 전격 수정 조치
                    rv.setViewpoint({
                        pan: viewpoint.pan,
                        tilt: viewpoint.tilt,
                        zoom: 0
                    });

                    // 시점 일치가 끝난 후 로드뷰 내부에 몬스터 생성
                    spawnMonsterInViewport(targetPos);
                }, 600);
            });
        }

        // 3. 로드뷰 뷰포트 내 몬스터 컴포넌트 부착
        function spawnMonsterInViewport(position) {
            const clean = document.getElementById('activeMonsterNode');
            if (clean) clean.remove();

            const node = document.createElement('div');
            node.id = 'activeMonsterNode';
            node.className = 'monster-overlay';

            const img = document.createElement('img');
            img.src = currentBattle.type === 'guardian' ? 'guardian.png' : 'bokoblin.png';
            img.className = 'monster-img';
            
            // 이미지 예외 복구 안전장치
            img.onerror = () => {
                img.style.display = 'none';
                const fallback = document.createElement('div');
                fallback.style.cssText = 'font-size:70px; font-weight:bold; color:red; text-shadow:0 0 10px #000;';
                fallback.innerText = currentBattle.type === 'guardian' ? '🐙[가디언]' : '🐷[보코블린]';
                node.appendChild(fallback);
            };

            node.appendChild(img);

            // 로드뷰 전용 입체 오버레이로 등록
            new kakao.maps.RoadviewCustomOverlay({
                position: position,
                viewAnchor: new kakao.maps.RoadviewViewAnchor({ x: 0.5, y: 0.5 }),
                content: node,
                map: rv
            });

            // 마우스 클릭 시 가격 데미지 작동
            node.onclick = (e) => dealDamage(e);
        }

        // 4. 리얼타임 타격 연출 알고리즘
        function dealDamage(e) {
            if (!currentBattle || currentBattle.hp <= 0) return;

            const dmg = Math.floor(Math.random() * 26) + 20; // 20~45 랜덤 타격
            currentBattle.hp -= dmg;
            if (currentBattle.hp < 0) currentBattle.hp = 0;

            // 보스 바 스케일링
            document.getElementById('monsterHp').style.width = `${(currentBattle.hp / currentBattle.maxHp) * 100}%`;

            // 크리티컬 데미지 수치 생성 팝업
            const pop = document.createElement('div');
            pop.className = 'damage-pop';
            pop.innerText = `-${dmg}`;
            pop.style.left = `${e.clientX}px`;
            pop.style.top = `${e.clientY}px`;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 500);

            // 사망 플래그 확인
            if (currentBattle.hp <= 0) {
                setTimeout(triggerVictoryPhase, 500);
            }
        }

        // 5. 처치 완료 및 [실제 지리 정보] 추출 파싱 엔진
        function triggerVictoryPhase() {
            // 보상 카드 주입
            document.getElementById('modalRegionName').innerText = `📍 지리 획득: ${currentBattle.placeName}`;
            document.getElementById('modalRegionText').innerHTML = `
                <p><strong>수집 구역 명칭:</strong> ${currentBattle.placeName}</p>
                <p><strong>해당 구역 주소:</strong> ${currentBattle.address}</p>
                <hr style="border-color:rgba(0,229,255,0.2); margin:12px 0;">
                <p style="font-size:13px; color:#aaa;">이 구역의 조사를 완료하여 하이랄 왕국의 지리 도감에 기록되었습니다. 해당 지역은 위도 ${currentBattle.lat}, 경도 ${currentBattle.lng} 지점에 명확히 안착되어 있습니다.</p>
                <hr style="border-color:rgba(0,229,255,0.2); margin:12px 0;">
                <p style="color:#39ff14; font-weight:bold; text-align:center;">🔷 보상: +${currentBattle.reward} RUPEES</p>
            `;

            // 모달 오픈 활성화
            const modal = document.getElementById('rewardModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 50);

            // 필드 백그라운드 원복 복구
            escapeBattle();
        }

        function claimRewards() {
            totalRupees += currentBattle.reward;
            document.getElementById('totalRupees').innerText = totalRupees;
            
            const modal = document.getElementById('rewardModal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function escapeBattle() {
            currentBattle = null;
            document.getElementById('gameContainer').classList.remove('battle-active');
            document.getElementById('regionList').style.display = 'block';
            document.getElementById('battleHud').style.display = 'none';
            const node = document.getElementById('activeMonsterNode');
            if (node) node.remove();
        }
    </script>
</body>
</html>
