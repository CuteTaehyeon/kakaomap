<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미세먼지로부터 세계 구하기 (Zelda Style)</title>
    <style>
        /* 1. 젤다 스타일 테마 및 기본 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 게임 클릭 시 텍스트 블록 방지 */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050b14;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            color: #e0f7fa;
        }

        /* 2. 레이아웃 분할 및 반응형 UI */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 (정보 패널) */
        .sidebar {
            width: 380px;
            height: 100%;
            background: linear-gradient(135deg, #050b14 0%, #0d1b2a 100%);
            border-right: 3px solid #00e5ff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: 5px 0 25px rgba(0, 229, 255, 0.2);
        }

        /* 오른쪽 메인 영역 (지도 & 로드뷰 화면) */
        .main-content {
            flex: 1;
            height: 100%;
            position: relative;
        }

        .map-area, .roadview-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease, z-index 0s;
        }

        .map-area { z-index: 2; opacity: 1; }
        .roadview-area { z-index: 1; opacity: 0; }

        /* 전투 모드 활성화 시 클래스 조작 */
        .battle-active .map-area { z-index: 1; opacity: 0; }
        .battle-active .roadview-area { z-index: 2; opacity: 1; }

        /* 3. 젤다 스타일 HUD 및 UI 요소 */
        .game-header {
            border-bottom: 2px dashed #00e5ff;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .title-sub {
            font-size: 11px;
            color: #00e5ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .title-main {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,229,255,0.6);
            margin-top: 5px;
        }

        /* 루피 카운터 */
        .rupee-hud {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #39ff14; /* 형광 그린 */
            text-shadow: 0 0 8px rgba(57,255,20,0.5);
            margin-bottom: 15px;
        }
        .rupee-icon { margin-right: 8px; font-size: 28px; }

        /* 검색창 */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #00e5ff;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }
        .search-box input:focus { outline: none; box-shadow: 0 0 8px #00e5ff; }
        .search-box button {
            padding: 0 15px;
            background: #00e5ff;
            border: none;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .search-box button:hover { background: #fff; box-shadow: 0 0 12px #fff; }

        /* 검색 리스트 */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }
        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .result-item:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
            transform: translateX(5px);
        }

        /* 4. 전투 진행용 대형 HUD (사이드바 내부 위치) */
        .battle-hud {
            display: none;
            background: rgba(255, 0, 60, 0.05);
            border: 1px solid #ff003c;
            padding: 15px;
            border-radius: 4px;
            margin-top: auto;
            box-shadow: inset 0 0 15px rgba(255,0,60,0.2);
        }
        .danger-ui {
            color: #ff003c;
            font-weight: bold;
            text-align: center;
            animation: blink 1s infinite alternate;
            font-size: 14px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .target-name { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .target-info { font-size: 13px; color: #ff80ab; margin-bottom: 10px; }
        
        /* 젤다 스타일 체력바 */
        .hp-container { width: 100%; height: 16px; background: #220008; border: 1px solid #ff003c; border-radius: 8px; overflow: hidden; position: relative; }
        .hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff003c, #ff5252); transition: width 0.2s ease; }

        /* 도망치기 버튼 */
        .btn-escape {
            width: 100%; margin-top: 15px; padding: 10px; background: transparent; border: 1px solid #fff;
            color: #fff; cursor: pointer; font-weight: bold; transition: all 0.3s;
        }
        .btn-escape:hover { background: #fff; color: #000; }

        /* 5. 로드뷰 내부 몬스터 커스텀 오버레이 디자인 */
        .monster-overlay {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(-50%, -50%); /* 중심 정렬 */
        }
        
        /* [조건 5] 애니메이션 및 필터 효과 장착한 몬스터 비주얼 */
        .monster-img {
            width: 260px;
            height: auto;
            cursor: pointer;
            filter: drop-shadow(0 25px 15px rgba(0, 0, 0, 0.7));
            animation: float 3s ease-in-out infinite;
            transition: transform 0.1s, filter 0.3s;
        }
        .monster-img:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 0 20px rgba(255,0,60,0.8)) brightness(1.2);
        }
        .monster-img:active { transform: scale(0.95); }

        /* 6. 데미지 팝업 텍스트 효과 */
        .damage-text {
            position: absolute;
            font-size: 38px;
            font-weight: 900;
            color: #ffeb3b;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 15px #ff0000;
            animation: damagePop 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        /* 7. 결과 모달창 시스템 (지리 정보 카드) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 11, 20, 0.85);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center; align-items: center;
        }
        .card {
            background: linear-gradient(180deg, #0d1b2a 0%, #050b14 100%);
            border: 3px solid #00e5ff;
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.4);
            width: 420px;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            transform: scale(0.8); opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.open .card { transform: scale(1); opacity: 1; }
        .card-header { font-size: 24px; font-weight: bold; color: #00e5ff; margin-bottom: 15px; }
        .card-body { text-align: left; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 4px; border: 1px solid rgba(0,229,255,0.1); margin-bottom: 20px; line-height: 1.6; }
        .card-body p { margin-bottom: 8px; }
        .btn-close-card { padding: 12px 30px; background: #39ff14; color: #000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-close-card:hover { background: #fff; box-shadow: 0 0 15px #39ff14; }

        /* 8. 애니메이션 모음 키프레임 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        @keyframes blink {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        @keyframes damagePop {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            50% { transform: translateY(-50px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-80px) scale(1); }
        }

        /* 모바일 대응 미디어쿼리 */
        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .sidebar { width: 100%; height: 40%; border-right: none; border-top: 3px solid #00e5ff; }
            .main-content { flex: 1; height: 60%; }
        }
    </style>
</head>
<body>

    <div id="gameContainer" class="container">
        <div class="sidebar">
            <div class="game-header">
                <div class="title-sub">Hyrule Eco-Guardian</div>
                <div class="title-main">미세먼지 격퇴 작전</div>
            </div>

            <div class="rupee-hud">
                <span class="rupee-icon">🔷</span>
                <span id="rupeeCount">0</span> <span style="font-size:14px; margin-left:5px; color:#aaa;">RUPEES</span>
            </div>

            <div class="search-box">
                <input type="text" id="keyword" placeholder="오염 구역 탐색 (예: 종로구)">
                <button onclick="searchPlaces()">탐색</button>
            </div>

            <ul id="resultList" class="result-list">
                </ul>

            <div id="battleHud" class="battle-hud">
                <div class="danger-ui">⚠️ DANGER: 오염 생명체 조우</div>
                <div id="targetName" class="target-name">보코블린</div>
                <div id="targetInfo" class="target-info">PM2.5: 65㎍/㎥ (서울 중구)</div>
                <div class="hp-container">
                    <div id="hpBar" class="hp-bar"></div>
                </div>
                <button class="btn-escape" onclick="exitBattleMode()">전투 이탈</button>
            </div>
        </div>

        <div class="main-content">
            <div id="map" class="map-area"></div>
            <div id="roadview" class="roadview-area"></div>
        </div>
    </div>

    <div id="cardModal" class="modal">
        <div class="card">
            <div id="cardHeader" class="card-header">📍 지리 정보 카드 해금</div>
            <div id="cardBody" class="card-body">
                </div>
            <button class="btn-close-card" onclick="closeCardModal()">카드 수령 완료</button>
        </div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5fadde5e88e43357b899abb7558e6206&libraries=services&autoload=false"></script>
    <script>
        // 전역 게임 변수 제어
        let map, rv, rvClient, ps;
        let currentMonster = null;
        let userRupees = 0;

        // [조건 2] 환경 데이터 기반 기획 몬스터 셋업 (하드코딩 데이터 보강)
        const monsterData = [
            { name: "보코블린", type: "bokoblin", lat: 37.5665, lng: 126.9780, dust: 65, reward: 50, maxHp: 100, hp: 100, region: "서울 중구", info: "행정·정치 중심 지역으로 교통량이 매우 조밀합니다. 도심 밀집 효과와 자동차 배출가스로 인해 미세먼지 수치가 상승합니다." },
            { name: "가디언", type: "guardian", lat: 37.5700, lng: 126.9820, dust: 120, reward: 150, maxHp: 250, hp: 250, region: "서울 종로구", info: "고궁과 빌딩 인프라가 결합된 상업 중심지입니다. 분지형 구조 특성과 외부 유입 오염물질 정체현상으로 인해 초미세먼지가 매우 높게 측정됩니다." },
            { name: "보코블린", type: "bokoblin", lat: 37.5445, lng: 127.0560, dust: 45, reward: 50, maxHp: 100, hp: 100, region: "성수동 팝업거리", info: "준공업지역 공장 설비와 최근 급증한 유동인구 팝업스토어 건설로 미세먼지 국소 차폐현상이 일어나는 지역입니다." }
        ];

        // 초기 시스템 초기화 및 비동기 동기화 보호
        kakao.maps.load(function() {
            // 지도 초기화
            const mapContainer = document.getElementById('map');
            const defaultPos = new kakao.maps.LatLng(37.566826, 126.9786567);
            map = new kakao.maps.Map(mapContainer, { center: defaultPos, level: 5 });
            
            // 검색 엔진 및 로드뷰 모듈 클라이언트 구축
            ps = new kakao.maps.services.Places();
            const rvContainer = document.getElementById('roadview');
            rv = new kakao.maps.Roadview(rvContainer);
            rvClient = new kakao.maps.RoadviewClient();

            // 유저 연동 및 몬스터 필터링 배치 작동
            getGeolocation();
            spawnMonstersOnMap();
        });

        // 1. 위치 연동 기능
        function getGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    map.setCenter(loc);
                });
            }
        }

        // 2. 검색 및 탐색창 구축
        function searchPlaces() {
            const kw = document.getElementById('keyword').value;
            if (!kw.trim()) return alert('탐색 키워드를 입력해 주세요.');
            ps.keywordSearch(kw, function(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    displaySearchResults(data);
                } else {
                    alert('오염 탐색 구역을 찾을 수 없습니다.');
                }
            });
        }

        function displaySearchResults(places) {
            const list = document.getElementById('resultList');
            const bounds = new kakao.maps.LatLngBounds();
            list.innerHTML = '';

            places.slice(0, 5).forEach(place => {
                const pos = new kakao.maps.LatLng(place.y, place.x);
                bounds.extend(pos);

                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `<strong>🔮 ${place.place_name}</strong><br><span style="font-size:12px;color:#aaa;">탐색 스캔 좌표 설정</span>`;
                li.onclick = () => map.setCenter(pos);
                list.appendChild(li);
            });
            map.setBounds(bounds);
        }

        // 3. 지도 위에 몬스터 마커 소환 (미세먼지 가이드 검증)
        function spawnMonstersOnMap() {
            monsterData.forEach((monster, index) => {
                if (monster.dust <= 30) return; // PM2.5 0~30은 평화 구역

                const pos = new kakao.maps.LatLng(monster.lat, monster.lng);
                
                // 마커 커스텀화 (젤다 스타일 유니크 이모지 설계)
                const markerContent = document.createElement('div');
                markerContent.style.fontSize = '32px';
                markerContent.style.cursor = 'pointer';
                markerContent.style.filter = 'drop-shadow(0 0 5px red)';
                markerContent.innerHTML = monster.type === 'guardian' ? '👁️' : '👹';

                const customMarker = new kakao.maps.CustomOverlay({
                    position: pos,
                    content: markerContent,
                    map: map
                });

                // 마커 클릭 시 로드뷰 배틀 페이즈로 전환 진입
                markerContent.onclick = () => enterBattlePhase(monster, index);
            });
        }

        // 4. 로드뷰 전투 페이즈 진입 모드 (Projection 핵심 구현 영역)
        function enterBattlePhase(monster, index) {
            currentMonster = { ...monster, id: index };
            const position = new kakao.maps.LatLng(monster.lat, monster.lng);

            // 해당 좌표 주변 파노라마 ID 연동 탐색 수행
            rvClient.getNearestPanoId(position, 50, function(panoId) {
                if (panoId === null) {
                    alert('전투용 지형(로드뷰) 데이터 확보에 실패했습니다. 다른 몬스터를 타겟팅해 주세요.');
                    return;
                }
                
                // 로드뷰 화면 동기화 매핑
                rv.setPanoId(panoId, position);
                document.getElementById('gameContainer').classList.add('battle-active');
                
                // 사이드바 HUD 교체
                document.getElementById('resultList').style.display = 'none';
                document.getElementById('battleHud').style.display = 'block';
                updateBattleHud();

                // [조건 4, 5] 로드뷰 좌표 투영 시스템 연동 및 오버레이 부착
                setTimeout(() => {
                    setupMonsterOverlayInRoadview(position);
                }, 500);
            });
        }

        // 5. 로드뷰 전용 오버레이 매핑 알고리즘
        function setupMonsterOverlayInRoadview(position) {
            // 기존 오브젝트 청소 후 재생성
            const existingOverlay = document.getElementById('roadviewMonster');
            if (existingOverlay) existingOverlay.remove();

            const container = document.createElement('div');
            container.id = 'roadviewMonster';
            container.className = 'monster-overlay';

            // 이미지 소스 매핑 및 파라미터 장착
            const img = document.createElement('img');
            // 로컬 파일명이 조건이므로 기획서의 파일명을 정확히 매칭합니다.
            img.src = currentMonster.type === 'guardian' ? 'guardian.png' : 'bokoblin.png';
            img.className = 'monster-img';
            
            // 이미지 깨짐 방지용 샘플 얼터너티브 아트 대체 로직 포함
            img.onerror = () => {
                img.style.display = 'none';
                const textFallback = document.createElement('div');
                textFallback.style.fontSize = '80px';
                textFallback.innerHTML = currentMonster.type === 'guardian' ? '🐙[가디언]' : '🐷[보코블린]';
                container.appendChild(textFallback);
            };

            container.appendChild(img);

            // 로드뷰 프로젝션(특수 정사영 뷰포트 오버레이) 선언
            const projectionOverlay = new kakao.maps.RoadviewCustomOverlay({
                position: position,
                viewAnchor: new kakao.maps.RoadviewViewAnchor({ x: 0.5, y: 0.5 }), // 중앙 고정 정렬
                content: container,
                map: rv
            });

            // [조건 6] 몬스터 신체 직접 타격(클릭) 이벤트 바인딩
            container.onclick = (e) => executeAttack(e);
        }

        // 6. 전투 데미지 메커니즘 엔진
        function executeAttack(e) {
            if (!currentMonster || currentMonster.hp <= 0) return;

            // 20~45 랜덤 데미지
            const dmg = Math.floor(Math.random() * (45 - 20 + 1)) + 20;
            currentMonster.hp -= dmg;
            if (currentMonster.hp < 0) currentMonster.hp = 0;

            // HUD 동적 반영
            updateBattleHpBar();

            // 크리티컬 데미지 텍스트 인게임 공간 렌더링 배출
            spawnDamageText(e.clientX, e.clientY, dmg);

            // 사망 판정 체킹 체인 트리거
            if (currentMonster.hp <= 0) {
                setTimeout(processVictory, 600);
            }
        }

        // 7. 시각 효과 제어기
        function spawnDamageText(x, y, damage) {
            const txt = document.createElement('div');
            txt.className = 'damage-text';
            txt.innerText = `-${damage}`;
            txt.style.left = `${x}px`;
            txt.style.top = `${y}px`;
            document.body.appendChild(txt);

            setTimeout(() => txt.remove(), 600);
        }

        function updateBattleHud() {
            document.getElementById('targetName').innerText = currentMonster.name;
            document.getElementById('targetInfo').innerText = `PM2.5: ${currentMonster.dust}㎍/㎥ (${currentMonster.region})`;
            updateBattleHpBar();
        }

        function updateBattleHpBar() {
            const prcnt = (currentMonster.hp / currentMonster.maxHp) * 100;
            document.getElementById('hpBar').style.width = `${prcnt}%`;
        }

        // 8. 보상 처리 및 지리 정보 모달 관리
        function processVictory() {
            userRupees += currentMonster.reward;
            document.getElementById('rupeeCount').innerText = userRupees;

            // 전투 종료 후 레이아웃 백 트래킹
            exitBattleMode();

            // [조건 9] 지리 정보 카드 해금 오픈
            openCardModal();
        }

        function openCardModal() {
            document.getElementById('cardHeader').innerText = `📍 지리 카드: ${currentMonster.region}`;
            document.getElementById('cardBody').innerHTML = `
                <p><strong>위험 개체:</strong> ${currentMonster.name}</p>
                <p><strong>오염 지수 (PM2.5):</strong> <span style="color:#ff003c;font-weight:bold;">${currentMonster.dust} ㎍/㎥</span></p>
                <hr style="border-color:rgba(0,229,255,0.2); margin:10px 0;">
                <p>${currentMonster.info}</p>
                <hr style="border-color:rgba(0,229,255,0.2); margin:10px 0;">
                <p style="color:#39ff14; font-weight:bold; text-align:center;">🔷 +${currentMonster.reward} RUPEES 획득 완료!</p>
            `;
            const m = document.getElementById('cardModal');
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('open'), 50);
        }

        function closeCardModal() {
            const m = document.getElementById('cardModal');
            m.classList.remove('open');
            setTimeout(() => m.style.display = 'none', 400);
        }

        function exitBattleMode() {
            currentMonster = null;
            document.getElementById('gameContainer').classList.remove('battle-active');
            document.getElementById('resultList').style.display = 'block';
            document.getElementById('battleHud').style.display = 'none';
            
            const mo = document.getElementById('roadviewMonster');
            if (mo) mo.remove();
        }
    </script>
</body>
</html>
