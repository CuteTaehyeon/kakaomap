<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5fadde5e88e43357b899abb7558e6206&libraries=services&autoload=false"></script>
<script>
    let map, rv, rvClient, ps;
    let currentBattle = null;
    let totalRupees = 0;
    let currentMarkers = [];
    let rvCustomOverlay = null;

    // 시스템 기동 및 초기화
    kakao.maps.load(function() {
        map = new kakao.maps.Map(document.getElementById('map'), {
            center: new kakao.maps.LatLng(37.566826, 126.9786567),
            level: 4
        });

        ps = new kakao.maps.services.Places();
        rv = new kakao.maps.Roadview(document.getElementById('roadview'));
        rvClient = new kakao.maps.RoadviewClient();

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
            });
        }
    });

    // 1. 전국 지명 검색을 통한 몬스터 현황 스캔
    function searchNewRegion() {
        const kw = document.getElementById('targetKeyword').value;
        if (!kw.trim()) return;

        ps.keywordSearch(kw, function(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                generateRegionMonsters(data);
            } else {
                alert('하이랄 지도에 존재하지 않는 지형 이름입니다.');
            }
        });
    }

    function generateRegionMonsters(places) {
        const list = document.getElementById('regionList');
        const bounds = new kakao.maps.LatLngBounds();
        
        currentMarkers.forEach(m => m.setMap(null));
        currentMarkers = [];
        list.innerHTML = '';

        places.slice(0, 6).forEach((place, idx) => {
            const pos = new kakao.maps.LatLng(place.y, place.x);
            bounds.extend(pos);

            const isBoss = idx % 3 === 0; 
            const monster = {
                name: isBoss ? "고대 가디언" : "야생 보코블린",
                type: isBoss ? "guardian" : "bokoblin",
                maxHp: isBoss ? 240 : 100,
                hp: isBoss ? 240 : 100,
                reward: isBoss ? 150 : 60,
                placeName: place.place_name,
                address: place.road_address_name || place.address_name,
                lat: place.y,
                lng: place.x
            };

            const markerEl = document.createElement('div');
            markerEl.style.cssText = 'font-size:32px; cursor:pointer; filter:drop-shadow(0 0 6px red);';
            markerEl.innerHTML = isBoss ? '👁️' : '👹';

            const overlay = new kakao.maps.CustomOverlay({
                position: pos,
                content: markerEl,
                map: map
            });
            currentMarkers.push(overlay);

            const li = document.createElement('li');
            li.className = 'result-item';
            li.innerHTML = `<strong>${monster.name} 발견</strong><br><span style="font-size:11px;color:#00e5ff;">📍 ${place.place_name}</span>`;
            
            const startAction = () => initBattleMode(monster);
            markerEl.onclick = startAction;
            li.onclick = startAction;

            list.appendChild(li);
        });

        map.setBounds(bounds);
    }

    // 2. 로드뷰 배틀 맵 로딩 및 시점 투영
    function initBattleMode(monster) {
        currentBattle = monster;
        const targetPos = new kakao.maps.LatLng(monster.lat, monster.lng);

        rvClient.getNearestPanoId(targetPos, 60, function(panoId) {
            if (!panoId) {
                alert('이 위치는 지형 정보 파노라마를 로드할 수 없습니다. 근처의 다른 구역을 선택하세요.');
                return;
            }

            if (rvCustomOverlay) {
                rvCustomOverlay.setMap(null);
                rvCustomOverlay = null;
            }
            kakao.maps.event.removeListener(rv, 'init');

            rv.setPanoId(panoId, targetPos);

            kakao.maps.event.addListener(rv, 'init', function() {
                const node = document.createElement('div');
                node.className = 'monster-overlay';

                const img = document.createElement('img');
                img.src = currentBattle.type === 'guardian' ? 'guardian.png' : 'bokoblin.png';
                img.className = 'monster-img';
                
                img.onerror = () => {
                    img.style.display = 'none';
                    const fallback = document.createElement('div');
                    fallback.style.cssText = 'font-size:60px; font-weight:bold; color:#ff003c; text-shadow:0 0 10px #000;';
                    fallback.innerText = currentBattle.type === 'guardian' ? '🐙[가디언]' : '🐷[보코블린]';
                    node.appendChild(fallback);
                };

                node.appendChild(img);

                rvCustomOverlay = new kakao.maps.CustomOverlay({
                    position: targetPos,
                    content: node,
                    xAnchor: 0.5,
                    yAnchor: 0.5
                });
                rvCustomOverlay.setMap(rv);

                const projection = rv.getProjection();
                const viewpoint = projection.viewpointFromCoords(rvCustomOverlay.getPosition(), 0);
                rv.setViewpoint(viewpoint);

                node.onclick = (e) => dealDamage(e);
            });

            document.getElementById('gameContainer').classList.add('battle-active');
            document.getElementById('regionList').style.display = 'none';
            document.getElementById('battleHud').style.display = 'block';
            
            document.getElementById('activeMonsterName').innerText = monster.name;
            document.getElementById('monsterHp').style.width = '100%';
        });
    }

    // 3. 타격 데미지 엔진
    function dealDamage(e) {
        if (!currentBattle || currentBattle.hp <= 0) return;

        const dmg = Math.floor(Math.random() * 26) + 20; 
        currentBattle.hp -= dmg;
        if (currentBattle.hp < 0) currentBattle.hp = 0;

        document.getElementById('monsterHp').style.width = `${(currentBattle.hp / currentBattle.maxHp) * 100}%`;

        const pop = document.createElement('div');
        pop.className = 'damage-pop';
        pop.innerText = `-${dmg}`;
        pop.style.left = `${e.clientX}px`;
        pop.style.top = `${e.clientY}px`;
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 500);

        if (currentBattle.hp <= 0) {
            setTimeout(triggerVictoryPhase, 500);
        }
    }

    // 4. [순서 교정] 전리품 준비 완료 후 모달 개방 (전투 종료는 나중에)
    function triggerVictoryPhase() {
        if (!currentBattle) return;

        document.getElementById('modalRegionName').innerText = `🗺️ 월드맵 데이터 복원 성공`;
        document.getElementById('modalRegionText').innerHTML = `
            <p style="color:#00e5ff; font-weight:bold; font-size:16px; margin-bottom:10px;">🗺️ 해금된 지역명: ${currentBattle.placeName}</p>
            <p><strong>상세 행정 좌표 주소:</strong> ${currentBattle.address}</p>
            <hr style="border-color:rgba(0,229,255,0.2); margin:12px 0;">
            <p style="font-size:13.5px; color:#aaa; line-height:1.5;">성공적으로 오염 개체를 몰아내어 하이랄 왕국의 잃어버린 월드맵 일부를 성공적으로 수집했습니다. 해당 지형의 절대 좌표 [위도 ${currentBattle.lat} / 경도 ${currentBattle.lng}] 정보가 도감에 기록되었습니다.</p>
            <hr style="border-color:rgba(0,229,255,0.2); margin:12px 0;">
            <p style="color:#39ff14; font-weight:bold; text-align:center; font-size:16px;">🔷 전리품 보상: +${currentBattle.reward} RUPEES</p>
        `;

        const modal = document.getElementById('rewardModal');
        modal.style.display = 'flex';
        // 확실하게 클릭 이벤트를 받기 위해 클래스 주입 시간 살짝 조절
        setTimeout(() => modal.classList.add('active'), 50); 
    }

    // 5. [수정 완료] 루피를 안전하게 지급한 후 모달과 필드를 닫음
    function claimRewards() {
        if (currentBattle) {
            // 루피 지급 계산 완료
            totalRupees += currentBattle.reward;
            document.getElementById('totalRupees').innerText = totalRupees;
        }
        
        // 모달창 닫기 및 초기화
        const modal = document.getElementById('rewardModal');
        modal.classList.remove('active');
        setTimeout(() => {
            modal.style.display = 'none';
            // 모달이 완전히 닫힌 후 필드를 원래대로 돌려놓음
            escapeBattle(); 
        }, 300);
    }

    function escapeBattle() {
        currentBattle = null;
        document.getElementById('gameContainer').classList.remove('battle-active');
        document.getElementById('regionList').style.display = 'block';
        document.getElementById('battleHud').style.display = 'none';
        
        if (rvCustomOverlay) {
            rvCustomOverlay.setMap(null);
            rvCustomOverlay = null;
        }
    }
</script>
