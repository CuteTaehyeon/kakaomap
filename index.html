<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LEGEND OF GEOGRAPHY - BOSS IF EDITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030708;
            font-family: 'Malgun Gothic', sans-serif;
            color: #cfebef;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 고풍스러운 하이랄 사이드바 */
        .sidebar {
            width: 380px;
            height: 100%;
            background: linear-gradient(180deg, #061014 0%, #020608 100%);
            border-right: 4px double #00e5ff;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.8);
        }

        .main-content {
            flex: 1;
            height: 100%;
            position: relative;
        }

        .map-area, .roadview-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 0.3s ease;
        }
        .map-area { z-index: 2; opacity: 1; }
        .roadview-area { z-index: 1; opacity: 0; }

        .battle-active .map-area { z-index: 1; opacity: 0; }
        .battle-active .roadview-area { z-index: 2; opacity: 1; }

        .shake {
            animation: screenShake 0.15s linear infinite;
        }

        .game-header {
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .title-sub {
            font-size: 11px;
            color: #00e5ff;
            letter-spacing: 3px;
        }
        .title-main {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px rgba(0,229,255,0.8);
            margin-top: 5px;
        }

        .rupee-hud {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #39ff14;
            text-shadow: 0 0 10px rgba(57,255,20,0.6);
            background: rgba(0, 229, 255, 0.05);
            border: 1px dashed rgba(0,229,255,0.3);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .rupee-icon { margin-right: 10px; }

        .search-box {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00e5ff;
            border-radius: 4px;
            color: #fff;
        }
        .search-box button {
            padding: 0 18px;
            background: #00e5ff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .search-box button:hover { background: #fff; box-shadow: 0 0 10px #fff; }

        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }
        .result-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0, 229, 255, 0.1);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-item:hover {
            background: rgba(0, 229, 255, 0.08);
            border-color: #00e5ff;
            transform: translateX(4px);
        }

        /* 👑 [전면 교체] 상단 거대 젤다 보스전 UI 패널 */
        .zelda-boss-panel {
            display: none;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 700px;
            z-index: 999;
            text-align: center;
            pointer-events: none; /* 뒷배경 클릭 방해 금지 */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.9));
        }
        .battle-active .zelda-boss-panel {
            display: block;
            animation: bossFadeIn 0.8s ease-out forwards;
        }

        .boss-name-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 6px;
        }
        .boss-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,0,60,0) 0%, rgba(255,0,60,0.8) 50%, rgba(255,0,60,0) 100%);
        }
        .boss-title-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff3b5c;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255,0,60,0.7), 2px 2px 2px #000;
            font-family: 'Georgia', serif;
        }

        .boss-hp-frame {
            width: 100%;
            height: 10px;
            background: rgba(40, 0, 10, 0.7);
            border: 1px solid rgba(255, 59, 92, 0.6);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
            position: relative;
        }
        .boss-hp-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #99001c 0%, #ff1744 50%, #ff617f 100%);
            box-shadow: 0 0 12px #ff1744;
            transition: width 0.2s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        .boss-hp-text {
            color: rgba(255,255,255,0.8);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 4px;
            text-shadow: 1px 1px 2px #000;
            text-align: right;
        }

        /* 하단 서브 도망치기 패널 */
        .escape-panel {
            display: none;
            position: absolute;
            bottom: 25px;
            right: 25px;
            z-index: 999;
        }
        .battle-active .escape-panel { display: block; }
        .btn-escape-action {
            padding: 10px 24px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            color: #ccc;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-escape-action:hover { background: #ff003c; border-color: #ff003c; color: #fff; box-shadow: 0 0 10px red; }

        /* 👾 몬스터 오버레이 및 피격 리액션 */
        .monster-img-overlay {
            width: 300px;
            height: auto;
            cursor: pointer;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.9));
            animation: floatGlow 2.5s ease-in-out infinite;
            transition: filter 0.05s, transform 0.05s;
        }
        .monster-hit {
            filter: drop-shadow(0 0 25px red) invert(15%) sepia(95%) saturate(7400%) hue-rotate(355deg) brightness(90%) contrast(120%) !important;
            transform: scale(0.85) cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ⚔️ 검기 궤적 이펙트 스타일 */
        .slash-effect {
            position: fixed;
            width: 180px;
            height: 30px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.9) 50%, rgba(0,229,255,0) 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform-origin: center;
            animation: slashAnim 0.25s ease-out forwards;
        }

        /* 💥 대형 데미지 팝업 */
        .damage-pop {
            position: fixed;
            font-size: 45px;
            font-weight: 900;
            color: #ffeb3b;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 15px red;
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
            z-index: 99999;
        }
        .damage-pop.critical {
            font-size: 65px;
            color: #ff3d00;
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 0 0 25px #ffeb3b;
            animation: popUpCritical 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
        }

        /* 고대 지리 정보 도감 카드 모달 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center;
        }
        .ancient-card {
            background: #061014; border: 2px solid #00e5ff; border-radius: 8px;
            width: 400px; padding: 25px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            transform: scale(0.8); opacity: 0; transition: all 0.2s ease;
        }
        .modal.active .ancient-card { transform: scale(1); opacity: 1; }
        .card-title { font-size: 22px; color: #00e5ff; margin-bottom: 15px; font-weight: bold; }
        .card-info { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,229,255,0.2); padding: 15px; border-radius: 4px; text-align: left; line-height: 1.6; margin-bottom: 20px;}
        .btn-claim { width: 100%; padding: 12px; background: #39ff14; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 15px;}

        /* 애니메이션 구현부 */
        @keyframes bossFadeIn {
            0% { opacity: 0; transform: translate(-50%, -20px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        @keyframes screenShake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes slashAnim {
            0% { transform: scaleX(0) rotate(var(--angle)) translateY(0); opacity: 1; }
            50% { transform: scaleX(1.2) rotate(var(--angle)) translateY(-10px); opacity: 1; }
            100% { transform: scaleX(1.5) rotate(var(--angle)) translateY(-20px); opacity: 0; }
        }
        @keyframes floatGlow {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        @keyframes popUp {
            0% { opacity: 1; transform: translateY(0) scale(0.6); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
        }
        @keyframes popUpCritical {
            0% { opacity: 1; transform: translateY(0) scale(0.5) rotate(-15deg); }
            50% { transform: translateY(-50px) scale(1.3) rotate(10deg); }
            100% { opacity: 0; transform: translateY(-130px) scale(1.0) rotate(0deg); }
        }

        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .sidebar { width: 100%; height: 45%; border-right: none; border-top: 4px double #00e5ff; }
            .main-content { flex: 1; height: 55%; }
            .zelda-boss-panel { top: 15px; width: 90%; }
            .boss-title-text { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="gameContainer" class="container">
        <div class="sidebar">
            <div class="game-header">
                <div class="title-sub">THE LEGEND OF GEOGRAPHY</div>
                <div class="title-main">하이랄 지리 조사단</div>
            </div>

            <div class="rupee-hud">
                <span class="rupee-icon">🔷</span>
                <span id="totalRupees">0</span>
            </div>

            <div class="search-box">
                <input type="text" id="targetKeyword" placeholder="새로운 조사 지역 입력">
                <button onclick="searchNewRegion()">조사</button>
            </div>

            <ul id="regionList" class="result-list">
                <li style="color:#666; text-align:center; padding-top:30px;">지역을 검색하여 몬스터를 파밍하세요.</li>
            </ul>
        </div>

        <div class="main-content" id="mainContent">
            <div class="zelda-boss-panel">
                <div class="boss-name-area">
                    <div class="boss-line"></div>
                    <div id="bossNameText" class="boss-title-text">전투 오염 개체</div>
                    <div class="boss-line"></div>
                </div>
                <div class="boss-hp-frame">
                    <div id="bossHpBar" class="boss-hp-bar"></div>
                </div>
                <div id="bossHpText" class="boss-hp-text">HP 100 / 100</div>
            </div>

            <div class="escape-panel">
                <button class="btn-escape-action" onclick="escapeBattle()">전투 무르기 (런)</button>
            </div>

            <div id="map" class="map-area"></div>
            <div id="roadview" class="roadview-area"></div>
        </div>
    </div>

    <div id="rewardModal" class="modal">
        <div class="ancient-card">
            <div id="modalRegionName" class="card-title">🗺️ 월드맵 데이터 복원</div>
            <div id="modalRegionText" class="card-info">데이터 로딩...</div>
            <button id="claimBtn" class="btn-claim" onclick="claimRewards()">지도 데이터 동기화</button>
        </div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5fadde5e88e43357b899abb7558e6206&libraries=services&autoload=false"></script>
    <script>
        let map, rv, rvClient, ps;
        let currentBattle = null;
        let totalRupees = 0;
        let currentMarkers = [];
        let rvCustomOverlay = null;

        kakao.maps.load(function() {
            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 4
            });

            ps = new kakao.maps.services.Places();
            rv = new kakao.maps.Roadview(document.getElementById('roadview'));
            rvClient = new kakao.maps.RoadviewClient();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
                });
            }
        });

        function searchNewRegion() {
            const kw = document.getElementById('targetKeyword').value;
            if (!kw.trim()) return;

            escapeBattle();

            ps.keywordSearch(kw, function(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    generateRegionMonsters(data);
                } else {
                    alert('하이랄 지도에 존재하지 않는 지형 이름입니다.');
                }
            });
        }

        function generateRegionMonsters(places) {
            const list = document.getElementById('regionList');
            const bounds = new kakao.maps.LatLngBounds();
            
            currentMarkers.forEach(m => m.setMap(null));
            currentMarkers = [];
            list.innerHTML = '';

            places.slice(0, 6).forEach((place, idx) => {
                const pos = new kakao.maps.LatLng(place.y, place.x);
                bounds.extend(pos);

                const isBoss = idx % 3 === 0; 
                const monster = {
                    name: isBoss ? "고대 가디언" : "야생 보코블린",
                    type: isBoss ? "guardian" : "bokoblin",
                    maxHp: isBoss ? 240 : 100,
                    hp: isBoss ? 240 : 100,
                    reward: isBoss ? 150 : 60,
                    placeName: place.place_name,
                    address: place.road_address_name || place.address_name,
                    lat: place.y,
                    lng: place.x
                };

                const markerEl = document.createElement('div');
                markerEl.style.cssText = 'font-size:32px; cursor:pointer; filter:drop-shadow(0 0 6px red);';
                markerEl.innerHTML = isBoss ? '👁️' : '👹';

                const overlay = new kakao.maps.CustomOverlay({
                    position: pos,
                    content: markerEl,
                    map: map
                });
                currentMarkers.push(overlay);

                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `<strong>${monster.name} 발견</strong><br><span style="font-size:11px;color:#00e5ff;">📍 ${place.place_name}</span>`;
                
                const startAction = () => initBattleMode(monster);
                markerEl.onclick = startAction;
                li.onclick = startAction;

                list.appendChild(li);
            });

            map.setBounds(bounds);
        }

        function initBattleMode(monster) {
            currentBattle = JSON.parse(JSON.stringify(monster)); 
            const targetPos = new kakao.maps.LatLng(monster.lat, monster.lng);

            rvClient.getNearestPanoId(targetPos, 60, function(panoId) {
                if (!panoId) {
                    alert('이 위치는 지형 파노라마를 로드할 수 없습니다. 다른 구역을 파밍하세요.');
                    return;
                }

                if (rvCustomOverlay) {
                    rvCustomOverlay.setMap(null);
                    rvCustomOverlay = null;
                }
                kakao.maps.event.removeListener(rv, 'init');

                rv.setPanoId(panoId, targetPos);

                kakao.maps.event.addListener(rv, 'init', function() {
                    
                    const img = document.createElement('img');
                    img.src = currentBattle.type === 'guardian' ? 'guardian.png' : 'bokoblin.png';
                    img.className = 'monster-img-overlay';
                    img.id = 'activeMonsterImg';
                    
                    img.onerror = () => {
                        img.style.display = 'none';
                        const fallback = document.createElement('div');
                        fallback.id = 'activeMonsterImg';
                        fallback.style.cssText = 'font-size:55px; font-weight:bold; color:#ff003c; text-shadow:0 0 10px #000; cursor:pointer; transition: transform 0.05s;';
                        fallback.innerText = currentBattle.type === 'guardian' ? '🐙[고대 가디언]' : '🐷[야생 보코블린]';
                        fallback.onclick = (e) => dealDamage(e);
                        
                        new kakao.maps.CustomOverlay({
                            map: rv,
                            position: new kakao.maps.Viewpoint(300, -5, 3),
                            content: fallback
                        });
                    };

                    img.onclick = (e) => dealDamage(e);

                    rv.setViewpoint(new kakao.maps.Viewpoint(300, -7, 3));

                    rvCustomOverlay = new kakao.maps.CustomOverlay({
                        map: rv,
                        position: new kakao.maps.Viewpoint(299.7, -7.6),
                        content: img
                    });
                });

                document.getElementById('gameContainer').classList.add('battle-active');
                document.getElementById('regionList').style.display = 'none';
                
                // 👑 대형 상단 패널 갱신
                document.getElementById('bossNameText').innerText = monster.name;
                document.getElementById('bossHpBar').style.width = '100%';
                document.getElementById('bossHpText').innerText = `HP ${monster.hp} / ${monster.maxHp}`;
            });
        }

        function dealDamage(e) {
            if (!currentBattle || currentBattle.hp <= 0) return;

            const isCritical = Math.random() < 0.15;
            let dmg = Math.floor(Math.random() * 21) + 20; 
            if (isCritical) dmg = Math.floor(dmg * 2.0);  

            currentBattle.hp -= dmg;
            if (currentBattle.hp < 0) currentBattle.hp = 0;

            // 👑 상단 대형 체력 게이지 스케일 동기화
            document.getElementById('bossHpBar').style.width = `${(currentBattle.hp / currentBattle.maxHp) * 100}%`;
            document.getElementById('bossHpText').innerText = `HP ${currentBattle.hp} / ${currentBattle.maxHp}`;

            const monsterImg = document.getElementById('activeMonsterImg');
            if (monsterImg) {
                monsterImg.classList.add('monster-hit');
                setTimeout(() => monsterImg.classList.remove('monster-hit'), 80);
            }

            const slash = document.createElement('div');
            slash.className = 'slash-effect';
            slash.style.left = `${e.clientX - 90}px`;
            slash.style.top = `${e.clientY - 15}px`;
            const randomAngle = Math.floor(Math.random() * 120) - 60; 
            slash.style.setProperty('--angle', `${randomAngle}deg`);
            document.body.appendChild(slash);
            setTimeout(() => slash.remove(), 250);

            const pop = document.createElement('div');
            pop.className = `damage-pop ${isCritical ? 'critical' : ''}`;
            pop.innerText = isCritical ? `💥 CRITICAL! -${dmg}` : `-${dmg}`;
            pop.style.left = `${e.clientX - 30}px`;
            pop.style.top = `${e.clientY - 40}px`;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 450);

            const rvField = document.getElementById('mainContent');
            rvField.classList.add('shake');
            setTimeout(() => rvField.classList.remove('shake'), isCritical ? 250 : 120);

            if (currentBattle.hp <= 0) {
                setTimeout(triggerVictoryPhase, 400);
            }
        }

        function triggerVictoryPhase() {
            if (!currentBattle) return;

            document.getElementById('modalRegionName').innerText = `🗺️ 월드맵 데이터 복원 성공`;
            document.getElementById('modalRegionText').innerHTML = `
                <p style="color:#00e5ff; font-weight:bold; font-size:16px; margin-bottom:10px;">🗺️ 해금된 지역명: ${currentBattle.placeName}</p>
                <p><strong>상세 행정 좌표 주소:</strong> ${currentBattle.address}</p>
                <hr style="border-color:rgba(0,229,255,0.2); margin:12px 0;">
                <p style="font-size:13.5px; color:#aaa; line-height:1.5;">오염 개체를 퇴치하여 하이랄 왕국의 잃어버린 도감을 채웠습니다. [위도 ${currentBattle.lat} / 경도 ${currentBattle.lng}] 정보가 성공적으로 수집되었습니다.</p>
                <hr style="border-color:rgba(0,229,255,0.2); margin:12px 0;">
                <p style="color:#39ff14; font-weight:bold; text-align:center; font-size:16px;">🔷 전리품 보상: +${currentBattle.reward} RUPEES</p>
            `;

            const modal = document.getElementById('rewardModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 50); 
        }

        function claimRewards() {
            if (currentBattle) {
                totalRupees += currentBattle.reward;
                document.getElementById('totalRupees').innerText = totalRupees;
            }
            
            const modal = document.getElementById('rewardModal');
            modal.classList.remove('active');
            
            setTimeout(() => {
                modal.style.display = 'none';
                escapeBattle(); 
            }, 200);
        }

        function escapeBattle() {
            currentBattle = null;
            document.getElementById('gameContainer').classList.remove('battle-active');
            document.getElementById('regionList').style.display = 'block';
            
            if (rvCustomOverlay) {
                rvCustomOverlay.setMap(null);
                rvCustomOverlay = null;
            }
        }
    </script>
</body>
</html>
